name: Release

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASE_TAG: emacs
    
    steps:
      - name: Check and delete existing release
        run: |
          # Check if release exists
          if gh release view ${{ env.RELEASE_TAG }} &>/dev/null; then
            gh release delete ${{ env.RELEASE_TAG }} -y
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Emacs repository
        uses: actions/checkout@v4
        with:
          repository: mayphus/emacs
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          brew install autoconf automake texinfo libxml2 jansson libgccjit

      - name: Build Emacs
        run: |
          ./autogen.sh
          ./configure --with-native-compilation --with-json --with-modules --with-xml2 --with-gnutls
          make -j$(sysctl -n hw.ncpu)
          mkdir release
          make install bindir=release

      - name: Package Emacs
        run: |
          cd nextstep/Emacs.app
          ls
          # Create a tarball of the Emacs.app bundle
          tar -czf ../../Emacs.app.tar.gz ../Emacs.app
          cd ../..
          echo "Created Emacs.app.tar.gz"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Emacs"
          body: |
            Build of Emacs master branch for macOS
          files: Emacs.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
